<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RURU-tracker Pro：匯出中心</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #007bff; --secondary: #6c757d; --success: #28a745; --info: #17a2b8; --warning: #ff9f43; --bg: #f4f7f6; --card-bg: #ffffff; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #fdfbfb 100%); padding: 10px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,123,255,0.1); border: 1px solid rgba(0,123,255,0.05); position: relative; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; margin-bottom: 20px; font-weight: 600; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .group { flex: 1; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; color: #495057; }
        select, input { width: 100%; padding: 10px; border: 1px solid #e1e8ed; border-radius: 10px; box-sizing: border-box; font-size: 1em; background-color: white; }
        .main-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary) 0%, #00a8ff 100%); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1em; }
        #result-area { display: none; margin-top: 20px; }
        .core-display { text-align: center; margin-bottom: 15px; }
        .result-amount { font-size: 2.8em; font-weight: 800; color: #0056b3; line-height: 1; }
        .unit { font-size: 0.5em; color: var(--secondary); margin-left: 5px; }
        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 10px; height: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); width: 0%; transition: width 0.4s; }
        .status-note-card { background: #fdfdfd; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-size: 0.9em; }
        .cups-section { margin-top: 25px; padding: 20px; background: #f8fbff; border-radius: 15px; border: 1px solid #e1f0ff; }
        .cups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .cup-item { text-align: center; cursor: pointer; }
        .cup-icon { width: 42px; height: 50px; background: #d1ecf1; border: 2.5px solid var(--primary); border-radius: 5px 5px 12px 12px; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; position: relative; }
        .cup-icon::after { content: '💧'; font-size: 1.1em; }
        .cup-item.done .cup-icon { background: #adb5bd; border-color: #6c757d; }
        .cup-item.done .cup-icon::after { content: '✅'; font-size: 0.9em; }
        .cup-time { font-size: 0.7em; color: #999; display: block; min-height: 1.2em; }
        .add-cup-btn { background: white; border: 2px dashed var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: bold; width: 100%; }
        .total-box { margin-top: 20px; padding: 15px; background: white; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .total-val { font-size: 1.8em; font-weight: 800; color: #0056b3; }
        
        /* 匯出選單樣式 */
        .export-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .export-label { font-size: 0.75em; font-weight: bold; color: var(--secondary); margin-bottom: 10px; display: block; text-align: center; }
        .export-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .export-btn { border: none; padding: 10px 5px; border-radius: 8px; color: white; font-weight: bold; font-size: 0.75em; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; }
        .export-btn:active { transform: scale(0.95); }
        .btn-excel { background-color: #28a745; }
        .btn-pdf { background-color: #dc3545; }
        .btn-img { background-color: #ff9f43; }
        
        .reset-link { font-size: 0.7em; color: #ccc; text-decoration: underline; margin-top: 20px; display: block; text-align: center; cursor: pointer; }
        .watermark { position: absolute; bottom: 10px; right: 20px; font-size: 0.6em; color: #ddd; display: none; }
    </style>
</head>
<body>
<div class="container" id="capture-area">
    <div class="card" id="main-card">
        <h2>RURU-tracker Pro</h2>
        <div class="form-row">
            <div class="group"><label>性別</label><select id="gender"><option value="" disabled selected>請選擇</option><option value="female">女性</option><option value="male">男性</option></select></div>
            <div class="group"><label>年齡</label><input type="number" id="age" placeholder="輸入年齡"></div>
        </div>
        <div class="form-row">
            <div class="group"><label>體重 (kg)</label><input type="number" id="weight" placeholder="輸入體重"></div>
            <div class="group"><label>狀態</label><select id="status"><option value="" disabled selected>請選擇</option><option value="weight_loss">減肥期間</option><option value="adult">一般成人</option><option value="high_temp">高溫工作</option><option value="chronic_disease">限水患者</option></select></div>
        </div>
        <button class="main-btn" onclick="initRURU()">開始今日計畫</button>
        
        <div id="result-area">
            <div class="core-display">
                <span style="font-size:0.8em; color:var(--primary); font-weight:bold;">建議每日目標</span><br>
                <span class="result-amount" id="amount">--</span><span class="unit">ml</span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="status-note-card" id="noteContent"></div>
            
            <div class="cups-section">
                <div class="cups-grid" id="cupsGrid"></div>
                <button class="add-cup-btn" onclick="addOneCup()">＋ 手動新增 250ml</button>
            </div>
            
            <div class="total-box">
                <div style="font-size:0.8em; color:#666; margin-bottom:5px;">今日已累計飲用</div>
                <span class="total-val" id="currentTotal">0</span> <small>ml</small>
            </div>

            <div class="export-section" id="export-ui">
                <span class="export-label">—— 匯出飲水報告 ——</span>
                <div class="export-grid">
                    <button class="export-btn btn-excel" onclick="exportExcel()"><span>📊</span>EXCEL</button>
                    <button class="export-btn btn-pdf" onclick="exportPDF()"><span>📄</span>PDF</button>
                    <button class="export-btn btn-img" onclick="exportImage()"><span>🖼️</span>下載圖檔</button>
                </div>
            </div>
            <span class="reset-link" id="reset-ui" onclick="clearAllData()">🗑️ 重設所有紀錄</span>
        </div>
        <div class="watermark" id="watermark">Created by RURU-prog</div>
    </div>
</div>

<script>
    let drinkData = []; let config = {};
    const STORAGE_KEY = 'RURU_WATER_LOG';

    window.onload = function() { loadSavedData(); };

    function initRURU(isAutoLoad = false) {
        const gender = document.getElementById('gender').value;
        const ageVal = document.getElementById('age').value;
        const weightVal = document.getElementById('weight').value;
        const status = document.getElementById('status').value;
        if (!gender || !ageVal || !weightVal || !status) { if(!isAutoLoad) alert("請填寫資訊喔！"); return; }
        const age = parseInt(ageVal); const weight = parseFloat(weightVal);
        let coeff = (age <= 12) ? 55 : (age >= 65 ? 30 : (gender === 'male' ? 35 : 30));
        let target = (status === 'chronic_disease') ? 1200 : (weight * coeff) + (status === 'weight_loss' ? 500 : (status === 'high_temp' ? 800 : 0));
        config = { target, date: new Date().toLocaleDateString() };
        document.getElementById('amount').innerText = Math.round(target);
        document.getElementById('noteContent').innerText = getNote(status);
        if (!isAutoLoad) {
            const cupCount = Math.ceil(target / 250);
            const grid = document.getElementById('cupsGrid'); grid.innerHTML = ''; drinkData = [];
            for (let i = 0; i < cupCount; i++) { createCupElement(i); }
        }
        document.getElementById('result-area').style.display = 'block';
        updateUI(); saveToLocal();
    }

    function createCupElement(index, savedTime = null) {
        const grid = document.getElementById('cupsGrid');
        const cup = document.createElement('div'); cup.className = 'cup-item' + (savedTime ? ' done' : ''); cup.id = `cup-${index}`;
        cup.onclick = () => toggleCup(index);
        cup.innerHTML = `<div class="cup-icon"></div><span class="cup-time">${savedTime || '--:--'}</span>`;
        grid.appendChild(cup);
        if (!savedTime) drinkData.push({ id: index, time: null, volume: 250 });
    }

    function toggleCup(index) {
        if (!drinkData[index].time) {
            drinkData[index].time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        } else { drinkData[index].time = null; }
        refreshCups(); updateUI(); saveToLocal();
    }

    function refreshCups() {
        const grid = document.getElementById('cupsGrid'); grid.innerHTML = '';
        drinkData.forEach((d, i) => {
            const cup = document.createElement('div'); cup.className = 'cup-item' + (d.time ? ' done' : '');
            cup.onclick = () => toggleCup(i);
            cup.innerHTML = `<div class="cup-icon"></div><span class="cup-time">${d.time || '--:--'}</span>`;
            grid.appendChild(cup);
        });
    }

    function addOneCup() { drinkData.push({ id: drinkData.length, time: null, volume: 250 }); refreshCups(); saveToLocal(); }

    function updateUI() {
        const totalIntake = drinkData.reduce((sum, d) => sum + (d.time ? d.volume : 0), 0);
        document.getElementById('currentTotal').innerText = totalIntake;
        document.getElementById('progressBar').style.width = Math.min((totalIntake / config.target) * 100, 100) + '%';
    }

    // --- 匯出功能區 ---
    function prepareForCapture(show) {
        document.getElementById('export-ui').style.display = show ? 'none' : 'block';
        document.getElementById('reset-ui').style.display = show ? 'none' : 'block';
        document.getElementById('watermark').style.display = show ? 'block' : 'none';
    }

    function exportImage() {
        prepareForCapture(true);
        html2canvas(document.querySelector("#main-card"), { scale: 2, backgroundColor: "#f4f7f6" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `RURU飲水圖檔_${config.date}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
            prepareForCapture(false);
        });
    }

    async function exportPDF() {
        prepareForCapture(true);
        const canvas = await html2canvas(document.querySelector("#main-card"), { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth() - 20;
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        pdf.text("RURU-tracker 個人飲水日誌", 10, 15);
        pdf.addImage(imgData, 'PNG', 10, 20, pdfWidth, pdfHeight);
        pdf.save(`RURU飲水報告_${config.date}.pdf`);
        prepareForCapture(false);
    }

    function exportExcel() {
        let csv = "\uFEFF日期," + config.date + "\n目標," + Math.round(config.target) + "ml\n累積," + document.getElementById('currentTotal').innerText + "ml\n\n杯次,容量,紀錄時間\n";
        drinkData.forEach((d, i) => { if(d.time) csv += (i+1) + "," + d.volume + "ml," + d.time + "\n"; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RURU飲水紀錄_${config.date}.csv`;
        link.click();
    }

    function saveToLocal() {
        const payload = {
            profile: { gender: document.getElementById('gender').value, age: document.getElementById('age').value, weight: document.getElementById('weight').value, status: document.getElementById('status').value },
            drinkData: drinkData, config: config, lastUpdate: new Date().toLocaleDateString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadSavedData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        document.getElementById('gender').value = data.profile.gender;
        document.getElementById('age').value = data.profile.age;
        document.getElementById('weight').value = data.profile.weight;
        document.getElementById('status').value = data.profile.status;
        if (data.lastUpdate === new Date().toLocaleDateString()) {
            config = data.config; drinkData = data.drinkData;
            document.getElementById('amount').innerText = Math.round(config.target);
            document.getElementById('noteContent').innerText = getNote(data.profile.status);
            refreshCups(); document.getElementById('result-area').style.display = 'block'; updateUI();
        }
    }

    function clearAllData() { if (confirm("確定重設今日紀錄？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function getNote(status) { const notes = {'weight_loss': "💡 減肥補水：飯前30分鐘喝水能增加飽足感。", 'high_temp': "☀️ 高溫提醒：請分次補充，並適度補充鹽分。", 'chronic_disease': "⚠️ 醫囑優先：限水者請遵守醫師建議。", 'adult': "💧 健康基準：口渴前先喝水效果最佳。"}; return notes[status] || "保持水分充足。"; }
</script>
</body>
</html>
