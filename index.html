<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RURU-tracker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --water-light: #5dade2; --water-dark: #3498db; --card-bg: #ffffff; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f4f8; padding: 10px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        h2 { color: #0056b3; text-align: center; margin-top: 0; margin-bottom: 20px; font-weight: 800; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .group { flex: 1; }
        label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ccc; border-radius: 12px; box-sizing: border-box; font-size: 1em; background-color: #fff; color: #000; outline: none; }
        .main-btn { width: 100%; padding: 16px; background: linear-gradient(45deg, #007bff, #00a8ff); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,123,255,0.2); }
        #result-area { display: none; margin-top: 25px; }
        .core-display { text-align: center; margin-bottom: 20px; background: #f8fbff; padding: 20px; border-radius: 20px; border: 2.5px solid #d1e3f8; }
        .result-amount { font-size: 3.2em; font-weight: 900; color: #004085; line-height: 1; }
        .limit-box { font-size: 0.8em; color: #dc3545; font-weight: bold; margin-top: 5px; }
        .hourly-target { font-size: 0.85em; color: #007bff; font-weight: bold; margin-top: 8px; display: block; }
        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 10px; height: 14px; margin: 15px 0; overflow: hidden; border: 1.5px solid #ddd; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); width: 0%; transition: width 1s; }
        .status-note-card { background: #fff; padding: 15px; border-radius: 15px; border: 1.5px solid #eee; border-left: 6px solid #007bff; margin-top: 10px; font-size: 0.9em; line-height: 1.6; color: #222; min-height: 50px; }
        .status-note-card.success { border-left-color: var(--success); background-color: #f0fff4; }
        .cups-section { margin-top: 20px; padding: 15px; background: #fff; border-radius: 20px; border: 1.5px solid #eee; }
        .cups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .cup-item { text-align: center; cursor: pointer; }
        .cup-glass { width: 42px; height: 52px; border: 2.5px solid #999; border-radius: 5px 5px 12px 12px; margin: 0 auto 5px; position: relative; overflow: hidden; background: #fff; }
        .cup-water { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(to top, #3498db, #5dade2); transition: height 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .cup-item.done .cup-glass { border-color: #0056b3; }
        .cup-item.done .cup-water { height: 100%; }
        .cup-label { font-size: 0.7em; color: #444; font-weight: bold; display: block; }
        .cup-time { font-size: 0.65em; color: #007bff; font-weight: 800; min-height: 1.2em; margin-top: 2px; }
        .add-cup-btn { background: #fff; border: 2px dashed #007bff; color: #007bff; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 0.85em; font-weight: bold; width: 100%; }
        .total-box { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 15px; text-align: center; border: 2px solid #eee; }
        .total-val { font-size: 2.2em; font-weight: 900; color: #004085; }
        .history-wall { margin-top: 20px; padding: 12px; background: #fff; border-radius: 15px; border: 1.5px solid #eee; }
        .history-title { font-size: 0.75em; font-weight: bold; color: #666; margin-bottom: 8px; display: block; text-align: center; }
        .history-dots { display: flex; justify-content: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; position: relative; }
        .dot.achieved { background: #28a745; border: 1px solid #1e7e34; }
        .dot::after { content: attr(data-date); position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 7px; color: #888; }
        .export-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 2px solid #eee; }
        .export-btn { border: none; padding: 12px 5px; border-radius: 12px; color: white; font-weight: bold; font-size: 0.75em; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-excel { background: #28a745; } .btn-pdf { background: #dc3545; } .btn-img { background: #f39c12; }
        .reset-link { font-size: 0.75em; color: #999; text-decoration: underline; margin-top: 15px; display: block; text-align: center; cursor: pointer; }
        #img-preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; padding: 15px; }
        #preview-img { max-width: 100%; max-height: 75%; border-radius: 12px; border: 4px solid #fff; }
        .preview-tip { color: white; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .close-preview { margin-top: 15px; background: #fff; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; }
        .footer-info { margin-top: 25px; text-align: center; font-size: 0.65em; color: #bbb; letter-spacing: 1px; }
        .watermark { text-align: right; font-size: 0.6em; color: #999; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="container" id="capture-container">
    <div class="card" id="main-card">
        <h2>RURU-tracker Pro</h2>
        <div class="form-row">
            <div class="group"><label>性別</label><select id="gender"><option value="" disabled selected>請選擇</option><option value="female">女性</option><option value="male">男性</option></select></div>
            <div class="group"><label>年齡</label><input type="number" id="age" placeholder="歲數"></div>
        </div>
        <div class="form-row">
            <div class="group"><label>體重 (kg)</label><input type="number" id="weight" placeholder="kg"></div>
            <div class="group"><label>目前狀態</label><select id="status"><option value="" disabled selected>請選擇</option><option value="weight_loss">減肥期間</option><option value="adult">一般成人</option><option value="high_temp">高溫工作</option><option value="chronic_disease">限水患者</option></select></div>
        </div>
        <div class="form-row">
            <div class="group"><label>預設每杯 (ml)</label><input type="number" id="cupSize" value="250"></div>
            <div class="group"><label>每小時目標 (ml)</label><input type="number" id="hourlyGoal" placeholder="選填"></div>
        </div>
        <button class="main-btn" onclick="initRURU()">開始今日計畫</button>
        <div id="result-area">
            <div class="core-display">
                <span style="font-size:0.8em; color:#007bff; font-weight:bold;">建議每日目標總量</span><br>
                <span class="result-amount" id="amount">--</span><span class="unit">ml</span><br>
                <div class="limit-box" id="limitBox">📈 健康上限：<span id="limitVal">--</span> ml</div>
                <div class="hourly-target" id="hourlyDisplay"></div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="status-note-card" id="noteContent"></div>
            <div class="cups-section"><div class="cups-grid" id="cupsGrid"></div><button class="add-cup-btn" id="addCupBtn" onclick="addOneCup()">＋ 新增一杯水</button></div>
            <div class="total-box"><div style="font-size:0.8em; color:#666; margin-bottom:5px;">今日已累計飲用</div><span class="total-val" id="currentTotal">0</span> <small>ml</small></div>
            <div class="history-wall"><span class="history-title">最近 7 日達成狀況</span><div class="history-dots" id="historyDots"></div></div>
            <div class="export-grid" id="export-ui">
                <button class="export-btn btn-excel" onclick="exportExcel()">📊 Excel</button>
                <button class="export-btn btn-pdf" onclick="exportPDF()">📄 PDF</button>
                <button class="export-btn btn-img" onclick="exportImage()">🖼️ 圖檔</button>
            </div>
            <span class="reset-link" id="reset-ui" onclick="clearAllData()">🗑️ 重設紀錄</span>
            <div class="watermark" id="watermark">Created by RURU-prog</div>
        </div>
        <div class="footer-info">VERSION 6.7</div>
    </div>
</div>
<div id="img-preview-overlay">
    <div class="preview-tip">✨ 飲水海報已產生！<br>手機端請【長按圖片】儲存</div>
    <img id="preview-img" src=""><button class="close-preview" onclick="closePreview()">關閉預覽</button>
</div>
<script>
    let drinkData = []; let config = {};
    const STORAGE_KEY = 'RURU_WATER_V6_7';
    const HISTORY_KEY = 'RURU_WATER_HISTORY';
    window.onload = function() { loadSavedData(); renderHistory(); };
    function initRURU(isAutoLoad = false) {
        const gender = document.getElementById('gender').value; const ageVal = document.getElementById('age').value; const weightVal = document.getElementById('weight').value; const status = document.getElementById('status').value; const hourlyGoal = document.getElementById('hourlyGoal').value;
        const activeCupSize = hourlyGoal ? parseInt(hourlyGoal) : (parseInt(document.getElementById('cupSize').value) || 250);
        if (!gender || !ageVal || !weightVal || !status) { if(!isAutoLoad) alert("請完整填寫喔！"); return; }
        const age = parseInt(ageVal); const weight = parseFloat(weightVal);
        let coeff = (age <= 12) ? 55 : (age >= 65 ? 30 : (gender === 'male' ? 35 : 30));
        let target = (status === 'chronic_disease') ? 1200 : (weight * coeff) + (status === 'weight_loss' ? 500 : (status === 'high_temp' ? 800 : 0));
        let limit = (status === 'chronic_disease') ? 1200 : (weight * 50) + (status === 'weight_loss' ? 500 : (status === 'high_temp' ? 800 : 0));
        config = { target, limit, activeCupSize, hourlyGoal, date: new Date().toLocaleDateString() };
        document.getElementById('amount').innerText = Math.round(target);
        document.getElementById('limitVal').innerText = Math.round(limit);
        document.getElementById('hourlyDisplay').innerText = hourlyGoal ? `⏰ 每小時目標：${hourlyGoal} ml` : "";
        document.getElementById('addCupBtn').innerText = `＋ 手動新增 ${activeCupSize}ml`;
        if (!isAutoLoad) {
            const cupCount = Math.ceil(target / activeCupSize);
            const grid = document.getElementById('cupsGrid'); grid.innerHTML = ''; drinkData = [];
            for (let i = 0; i < cupCount; i++) { createCupElement(i); }
        }
        document.getElementById('result-area').style.display = 'block'; updateUI(); saveToLocal();
    }
    function createCupElement(index, savedTime = null) {
        const grid = document.getElementById('cupsGrid'); const cup = document.createElement('div'); cup.className = 'cup-item' + (savedTime ? ' done' : ''); cup.id = `cup-${index}`; cup.onclick = () => toggleCup(index);
        cup.innerHTML = `<div class="cup-glass"><div class="cup-water"></div></div><span class="cup-label">${config.activeCupSize}ml</span><span class="cup-time" id="time-${index}">${savedTime || '--:--'}</span>`;
        grid.appendChild(cup); if (!savedTime) drinkData.push({ id: index, time: null, volume: config.activeCupSize });
    }
    function toggleCup(index) {
        const item = document.getElementById(`cup-${index}`); const timeLabel = document.getElementById(`time-${index}`); const cupData = drinkData[index];
        if (!cupData.time) { cupData.time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); item.classList.add('done'); timeLabel.innerText = cupData.time; }
        else { cupData.time = null; item.classList.remove('done'); timeLabel.innerText = '--:--'; }
        updateUI(); saveToLocal();
    }
    function addOneCup() { const index = drinkData.length; drinkData.push({ id: index, time: null, volume: config.activeCupSize }); createCupElement(index); updateUI(); saveToLocal(); }
    function updateUI() {
        const total = drinkData.reduce((sum, d) => sum + (d.time ? d.volume : 0), 0); document.getElementById('currentTotal').innerText = total;
        const percent = (total / config.target) * 100; document.getElementById('progressBar').style.width = Math.min(percent, 100) + '%';
        if (percent >= 100 && !window.hasCelebrated) { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); window.hasCelebrated = true; updateHistory(true); }
        else if (percent < 100) { window.hasCelebrated = false; }
        updateSmartNote(percent);
    }
    function updateSmartNote(percent) {
        const noteEl = document.getElementById('noteContent'); const status = document.getElementById('status').value;
        if (percent >= 100) { noteEl.innerHTML = "🎉 <b>今日目標已達成！</b><br>代謝力處於巔峰狀態！"; noteEl.classList.add('success'); }
        else {
            const tips = { 'weight_loss': ["💡 脂肪代謝需要水分參與，缺水會讓減肥進入停滯期。", "💡 飯前30分鐘喝水，能顯著增加飽足感。"], 'adult': ["💡 大腦水分若減少 2%，專注力就會開始下降。", "💡 規律補水能讓血液循環更順暢。"], 'high_temp': ["☀️ 高溫下流汗量大，請務必分次小口補水。", "☀️ 感到口渴時，身體已處於輕微脫水狀態。"], 'chronic_disease': ["⚠️ 限水患者請嚴格遵照醫囑。", "⚠️ 可用冰水漱口來緩解不適感。"] };
            noteEl.innerHTML = percent >= 75 ? "🚀 快達標了！再喝一點點就成功囉！" : (tips[status] || tips['adult'])[Math.floor(Math.random() * 2)];
            noteEl.classList.remove('success');
        }
    }
    function updateHistory(achieved) { let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); history[config.date] = achieved; localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); renderHistory(); }
    function renderHistory() {
        const grid = document.getElementById('historyDots'); grid.innerHTML = ''; let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
        for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); const dateStr = d.toLocaleDateString(); const dot = document.createElement('div'); dot.className = 'dot' + (history[dateStr] ? ' achieved' : ''); dot.setAttribute('data-date', dateStr.split('/')[1] + '/' + dateStr.split('/')[2]); grid.appendChild(dot); }
    }
    function saveToLocal() { const payload = { profile: { gender: document.getElementById('gender').value, age: document.getElementById('age').value, weight: document.getElementById('weight').value, status: document.getElementById('status').value, cupSize: document.getElementById('cupSize').value, hourlyGoal: document.getElementById('hourlyGoal').value }, drinkData, config, lastUpdate: new Date().toLocaleDateString() }; localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }
    function loadSavedData() {
        const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return; const data = JSON.parse(raw);
        document.getElementById('gender').value = data.profile.gender; document.getElementById('age').value = data.profile.age; document.getElementById('weight').value = data.profile.weight; document.getElementById('status').value = data.profile.status; document.getElementById('cupSize').value = data.profile.cupSize || 250; document.getElementById('hourlyGoal').value = data.profile.hourlyGoal || "";
        if (data.lastUpdate === new Date().toLocaleDateString()) {
            config = data.config; drinkData = data.drinkData; document.getElementById('amount').innerText = Math.round(config.target); document.getElementById('limitVal').innerText = Math.round(config.limit || 0); document.getElementById('hourlyDisplay').innerText = config.hourlyGoal ? `⏰ 每小時目標：${config.hourlyGoal} ml` : "";
            const grid = document.getElementById('cupsGrid'); grid.innerHTML = ''; drinkData.forEach((d, i) => { createCupElement(i, d.time); }); document.getElementById('result-area').style.display = 'block'; updateUI();
        }
    }
    function clearAllData() { if (confirm("確定重設今日紀錄？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    
    function exportImage() {
        const card = document.querySelector("#main-card"); document.getElementById('export-ui').style.display = 'none'; document.getElementById('reset-ui').style.display = 'none'; document.getElementById('watermark').style.display = 'block';
        html2canvas(card, { scale: 2, backgroundColor: "#ffffff", onclone: (clonedDoc) => {
            const clonedCard = clonedDoc.querySelector("#main-card"); clonedCard.style.color = "#222"; clonedCard.querySelectorAll(".cup-water").forEach(el => el.style.background = "linear-gradient(to top, #2980b9, #3498db)");
        }}).then(canvas => {
            const imgData = canvas.toDataURL("image/jpeg", 0.95); document.getElementById('preview-img').src = imgData; document.getElementById('img-preview-overlay').style.display = 'flex';
            const link = document.createElement('a'); link.href = imgData; link.download = `RURU飲水海報_${config.date.replace(/\//g,'_')}.jpg`; link.click();
            document.getElementById('export-ui').style.display = 'grid'; document.getElementById('reset-ui').style.display = 'block'; document.getElementById('watermark').style.display = 'none';
        });
    }
    function closePreview() { document.getElementById('img-preview-overlay').style.display = 'none'; }

    async function exportPDF() {
        const canvas = await html2canvas(document.querySelector("#main-card"), { scale: 2, backgroundColor: "#ffffff" });
        const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = 190; const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 20, pdfWidth, pdfHeight);
        const pdfData = pdf.output('bloburl');
        // 手機版核心修復：在新分頁打開 PDF 預覽
        window.open(pdfData, '_blank');
        // 同時嘗試自動儲存
        pdf.save(`RURU飲水報告_${config.date.replace(/\//g,'_')}.pdf`);
    }

    function exportExcel() {
        let csv = "\uFEFF日期," + config.date + "\n目標," + Math.round(config.target) + "ml\n累積," + document.getElementById('currentTotal').innerText + "ml\n\n杯次,容量,紀錄時間\n";
        drinkData.forEach((d, i) => { if(d.time) csv += (i+1) + "," + d.volume + "ml," + d.time + "\n"; });
        // 手機版核心修復：使用 Data URI 格式
        const encodedUri = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
        const link = document.createElement("a"); link.setAttribute("href", encodedUri);
        link.setAttribute("download", `RURU飲水紀錄_${config.date.replace(/\//g,'_')}.csv`);
        document.body.appendChild(link);
        link.click(); document.body.removeChild(link);
    }
</script>
</body>
</html>
