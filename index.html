<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RURU-tracker Pro V8.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007bff; --water-blue: linear-gradient(180deg, #5dade2 0%, #3498db 100%); }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #f4f7f9; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; color: #333; }
        .container { width: 100%; max-width: 450px; }
        .card { background: #fff; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #0056b3; margin-top: 0; font-weight: 900; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .group { flex: 1; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1rem; box-sizing: border-box; background: #fff; outline: none; }

        #result-area { display: none; }
        .display-card { text-align: center; background: #f8fbff; padding: 20px; border-radius: 20px; border: 2.5px solid #e1efff; margin-bottom: 20px; }
        .target-val { font-size: 3rem; font-weight: 900; color: #004085; line-height: 1; }
        .limit-info { font-size: 0.85rem; font-weight: bold; margin-top: 8px; color: #888; }
        .limit-info.over { background: #dc3545; color: #fff; padding: 4px 8px; border-radius: 8px; }

        /* 水杯網格 */
        .cups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .cup-item { text-align: center; cursor: pointer; }
        .cup-glass { width: 45px; height: 55px; border: 2.5px solid #bbb; border-radius: 5px 5px 12px 12px; margin: 0 auto 5px; position: relative; overflow: hidden; background: #fff; }
        .cup-water { position: absolute; bottom: 0; left: 0; width: 100%; height: 0; background: var(--water-blue); transition: height 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
        
        /* 只有在 filled 類別存在時才注滿，且渲染時若已有 filled 則跳過動畫 */
        .cup-item.filled .cup-water { height: 100%; }
        .cup-item.filled .cup-glass { border-color: var(--primary); }
        .cup-item.no-anim .cup-water { transition: none !important; }

        .cup-label { font-size: 0.7rem; font-weight: bold; color: #555; }
        .cup-time { font-size: 0.65rem; color: var(--primary); font-weight: 800; min-height: 1.1em; cursor: edit; text-decoration: underline dotted; }

        .action-panel { background: #f9fafb; padding: 15px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        .btn-add-fast { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .export-btn { background: #f39c12; color: #fff; border: none; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 1.05rem; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #preview-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; flex-direction:column; padding:20px; }
        #preview-img { max-width: 90%; max-height: 80%; border-radius: 15px; border: 3px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="main-card">
        <h2>RURU-tracker Pro</h2>
        
        <div class="setup-area" id="setup-panel" style="border-bottom: 2px dashed #eee; padding-bottom: 20px; margin-bottom: 20px;">
            <div class="form-row">
                <div class="group"><label>性別</label><select id="gender"><option value="" disabled selected>請選擇</option><option value="female">女性</option><option value="male">男性</option></select></div>
                <div class="group"><label>年齡</label><input type="number" id="age" placeholder="歲" inputmode="numeric"></div>
            </div>
            <div class="form-row">
                <div class="group"><label>體重 (kg)</label><input type="number" id="weight" placeholder="kg" inputmode="decimal"></div>
                <div class="group"><label>目前狀態</label><select id="status"><option value="" disabled selected>請選擇</option><option value="adult">一般成人</option><option value="weight_loss">減肥期間</option><option value="high_temp">高溫工作</option><option value="chronic_disease">限水患者</option></select></div>
            </div>
            <div class="form-row">
                <div class="group"><label>預設每杯 (ml)</label><input type="number" id="cfgCup" value="200" inputmode="numeric"></div>
                <div class="group"><label>每小時目標 (ml)</label><input type="number" id="cfgHour" placeholder="選填" inputmode="numeric"></div>
            </div>
            <button onclick="initApp()" style="width:100%; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">開始今日計畫</button>
        </div>

        <div id="result-area">
            <div class="display-card">
                <div style="font-size:0.8rem; color:var(--primary); font-weight:bold;">建議每日目標</div>
                <span class="target-val" id="uiTar">--</span> <small style="font-weight:bold;">ml</small>
                <div class="limit-info" id="uiLim">📈 健康上限：-- ml</div>
                <div id="uiHour" style="font-size: 0.75rem; color: #007bff; margin-top: 5px; font-weight: bold;"></div>
            </div>

            <div class="cups-grid" id="cupsGrid"></div>

            <div class="action-panel">
                <label style="display:block; font-size:0.75rem; font-weight:bold; color:#666; margin-bottom:8px;">＋ 新增飲水紀錄 (預設新增為空杯)</label>
                <div class="form-row" style="margin-bottom:0;">
                    <div class="group"><button class="btn-add-fast" id="fastAddLabel" onclick="addBlankCup(null)">快速新增空杯</button></div>
                    <div class="group"><input type="number" id="customMl" placeholder="自填 ml" inputmode="numeric" style="padding:10px;"></div>
                    <div style="width:50px;"><button onclick="addBlankCup(document.getElementById('customMl').value)" style="width:100%; height:100%; border-radius:12px; border:1px solid var(--primary); color:var(--primary); background:#fff; font-weight:bold; cursor:pointer;">GO</button></div>
                </div>
            </div>

            <button class="export-btn" id="btn-cap" onclick="capture()">📸 產生今日飲水成就海報</button>

            <div style="margin-top:20px; text-align:center;">
                <span style="font-size:0.8rem; color:#666;">今日累計：</span>
                <span id="uiTotal" style="font-size:1.8rem; font-weight:900; color:#004085;">0</span> <small>ml</small>
            </div>
            <div id="wm" style="display:none; text-align:center; font-size:10px; color:#ccc; margin-top:15px;">Created by RURU-prog</div>
            <div style="text-align:center; font-size:0.75rem; color:#ddd; cursor:pointer; margin-top:15px;" onclick="reset()">重設紀錄</div>
        </div>
    </div>
</div>

<div id="preview-overlay">
    <div style="color:#fff; margin-bottom:15px; font-weight:bold;">✨ 長按圖片儲存成就</div>
    <img id="preview-img" src="">
    <button onclick="document.getElementById('preview-overlay').style.display='none'" style="margin-top:20px; padding:10px 40px; border-radius:20px; border:none; font-weight:bold; cursor:pointer;">關閉預覽</button>
</div>

<script>
    let state = { cups: [], cfg: {} };
    const KEY = 'RURU_V85_STABLE';

    function initApp() {
        const gen = document.getElementById('gender').value;
        const age = parseInt(document.getElementById('age').value);
        const wet = parseFloat(document.getElementById('weight').value);
        const sta = document.getElementById('status').value;
        const dC = parseInt(document.getElementById('cfgCup').value) || 200;
        const hG = parseInt(document.getElementById('cfgHour').value) || 0;

        if(!gen || !age || !wet || !sta) return alert("請完整填寫生理資料。");

        let tar = (sta==='chronic_disease')? 1200 : (wet*(age>=65?30:(gen==='male'?35:30))) + (sta==='weight_loss'?500:(sta==='high_temp'?800:0));
        let lim = (sta==='chronic_disease')? 1200 : (wet*50) + (sta==='weight_loss'?500:(sta==='high_temp'?800:0));

        state.cfg = { tar, lim, dC, hG, date: new Date().toLocaleDateString() };
        state.cups = [];
        for(let i=0; i<Math.ceil(tar/dC); i++) state.cups.push({ v: dC, t: null });

        document.getElementById('fastAddLabel').innerText = `快速新增 ${dC}ml`;
        render();
        document.getElementById('result-area').style.display = 'block';
        update();
        save();
    }

    function render() {
        const grid = document.getElementById('cupsGrid');
        grid.innerHTML = '';
        state.cups.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'cup-item';
            // 如果已經有時間戳記，初始載入時不應有動畫，直接填滿
            if(c.t) el.classList.add('filled', 'no-anim');
            
            el.innerHTML = `
                <div class="cup-glass"><div class="cup-water"></div></div>
                <span class="cup-label">${c.v}ml</span>
                <div class="cup-time" onclick="editTime(event, ${i})">${c.t || ''}</div>
            `;
            
            // 點擊杯子主體才觸發注水
            el.querySelector('.cup-glass').onclick = (e) => {
                e.stopPropagation();
                if(!state.cups[i].t) {
                    state.cups[i].t = getTime();
                    el.classList.remove('no-anim');
                    el.classList.add('filled');
                } else {
                    state.cups[i].t = null;
                    el.classList.remove('filled', 'no-anim');
                }
                update(); save();
                el.querySelector('.cup-time').innerText = state.cups[i].t || '';
            };
            grid.appendChild(el);
        });
    }

    // 修正點：新增為空杯
    function addBlankCup(val) {
        let v = val ? parseInt(val) : state.cfg.dC;
        if(isNaN(v) || v <= 0) return alert("請輸入正確數值。");
        state.cups.push({ v: v, t: null }); // t 為 null 即為空杯
        document.getElementById('customMl').value = '';
        render(); update(); save();
    }

    // 修正點：修改時間戳記
    function editTime(event, index) {
        event.stopPropagation();
        if(!state.cups[index].t) return; // 沒喝水不能改時間
        let newTime = prompt("修改飲水時間 (格式 HH:mm):", state.cups[index].t);
        if(newTime !== null) {
            state.cups[index].t = newTime;
            render(); save();
        }
    }

    function update() {
        let ttl = state.cups.reduce((s, c) => s + (c.t ? c.v : 0), 0);
        document.getElementById('uiTar').innerText = Math.round(state.cfg.tar);
        document.getElementById('uiLim').innerText = `📈 健康上限：${Math.round(state.cfg.lim)} ml`;
        document.getElementById('uiTotal').innerText = ttl;
        document.getElementById('uiHour').innerText = state.cfg.hG ? `⏰ 每小時目標：${state.cfg.hG} ml` : "";
        
        if(ttl > state.cfg.lim) {
            document.getElementById('uiLim').className = "limit-info over";
        } else {
            document.getElementById('uiLim').className = "limit-info";
            if(ttl >= state.cfg.tar && !window.conf) {
                confetti({particleCount:150, spread:70, origin:{y:0.6}});
                window.conf = true;
            } else if(ttl < state.cfg.tar) { window.conf = false; }
        }
    }

    function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',hour12:false}); }
    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
    function reset() { if(confirm("確定重設？")) { localStorage.removeItem(KEY); location.reload(); } }

    function capture() {
        const target = document.getElementById('main-card');
        const btn = document.getElementById('btn-cap');
        btn.style.visibility = 'hidden';
        document.getElementById('wm').style.display = 'block';
        html2canvas(target, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL("image/jpeg", 0.9);
            document.getElementById('preview-overlay').style.display = 'flex';
            btn.style.visibility = 'visible';
            document.getElementById('wm').style.display = 'none';
        });
    }

    const saved = localStorage.getItem(KEY);
    if(saved) {
        const p = JSON.parse(saved);
        if(p.cfg.date === new Date().toLocaleDateString()) {
            state = p;
            document.getElementById('fastAddLabel').innerText = `快速新增 ${state.cfg.dC}ml`;
            document.getElementById('result-area').style.display = 'block';
            render(); update();
        }
    }
</script>
</body>
</html>
