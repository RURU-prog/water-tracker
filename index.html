<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RURU-tracker Pro V7.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; padding: 10px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .container { width: 100%; max-width: 420px; }
        .card { background: #ffffff; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h2 { color: #0056b3; text-align: center; margin: 0 0 15px 0; font-weight: 800; }
        .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        select, input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; -webkit-appearance: none; }
        .main-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 17px; cursor: pointer; }
        
        #result-area { display: none; margin-top: 15px; }
        .date-label { text-align: center; font-size: 12px; color: #999; margin-bottom: 5px; }
        .core-display { text-align: center; margin-bottom: 15px; background: #f0f7ff; padding: 15px; border-radius: 15px; border: 2px solid #cce5ff; }
        .result-amount { font-size: 38px; font-weight: 900; color: #004085; line-height: 1; }
        .limit-box { font-size: 12px; color: var(--danger); font-weight: bold; margin-top: 5px; }
        
        .progress-container { width: 100%; background: #eee; border-radius: 10px; height: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #007bff; width: 0%; transition: width 0.5s; }
        .status-note { background: #fff; padding: 12px; border-radius: 12px; border: 1px solid #eee; border-left: 5px solid #007bff; margin-top: 10px; font-size: 13px; }

        .cups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .cup-item { text-align: center; cursor: pointer; }
        .cup-glass { width: 36px; height: 46px; border: 2px solid #ccc; border-radius: 4px 4px 10px 10px; margin: 0 auto 4px; position: relative; overflow: hidden; background: #fff; }
        .cup-water { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #3498db; transition: height 0.3s; }
        .cup-item.done .cup-glass { border-color: #007bff; }
        .cup-item.done .cup-water { height: 100%; }
        .cup-label { font-size: 11px; font-weight: bold; color: #666; display: block; }
        .cup-time { font-size: 10px; color: #007bff; font-weight: bold; }
        
        .add-btn { background: #fff; border: 2px dashed #007bff; color: #007bff; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; width: 100%; cursor: pointer; }
        .total-display { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 12px; text-align: center; border: 1px solid #ddd; }
        .total-val { font-size: 26px; font-weight: 900; color: #004085; }
        
        .export-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; text-align: center; }
        .btn-export { width: 100%; background: #f39c12; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(243,156,18,0.2); }
        .reset-link { font-size: 12px; color: #bbb; margin-top: 15px; display: block; cursor: pointer; text-decoration: underline; }

        #preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        #preview-img { max-width: 100%; max-height: 75%; border: 2px solid #fff; border-radius: 8px; }
        .tip-text { color: #fff; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .btn-close { margin-top: 20px; background: #fff; border: none; padding: 10px 40px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="main-card">
        <h2>RURU-tracker Pro</h2>
        <div id="setup-form">
            <div class="form-row">
                <div class="group"><label>性別</label><select id="gender"><option value="female">女性</option><option value="male">男性</option></select></div>
                <div class="group"><label>年齡</label><input type="number" id="age" value="30"></div>
            </div>
            <div class="form-row">
                <div class="group"><label>體重(kg)</label><input type="number" id="weight" value="60"></div>
                <div class="group"><label>狀態</label><select id="status"><option value="adult">一般成人</option><option value="weight_loss">減肥期間</option><option value="high_temp">高溫工作</option><option value="chronic_disease">限水患者</option></select></div>
            </div>
            <div class="form-row">
                <div class="group"><label>杯子容量(ml)</label><input type="number" id="cupSize" value="250"></div>
                <div class="group"><label>每小時目標</label><input type="number" id="hourlyGoal" placeholder="選填"></div>
            </div>
            <button class="main-btn" onclick="startApp()">開始今日計畫</button>
        </div>

        <div id="result-area">
            <div class="date-label" id="displayDate"></div>
            <div class="core-display">
                <span style="font-size:12px; color:#007bff; font-weight:bold;">建議每日目標</span><br>
                <span class="result-amount" id="targetAmount">--</span><span style="font-size:16px; margin-left:5px;">ml</span>
                <div class="limit-box" id="limitBox">📈 健康上限：<span id="limitVal">--</span> ml</div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="status-note" id="statusNote"></div>
            <div class="cups-grid" id="cupsGrid"></div>
            <button class="add-btn" id="addBtn" onclick="addNewCup()">＋ 手動新增</button>
            <div class="total-display">
                <span style="font-size:12px; color:#666;">今日累計</span><br>
                <span class="total-val" id="totalVal">0</span> <small>ml</small>
            </div>
            <div class="export-section" id="hide-on-export">
                <button class="btn-export" onclick="captureImage()">📸 產生飲水成就圖</button>
                <span class="reset-link" onclick="resetApp()">🗑️ 重設所有紀錄</span>
            </div>
            <div id="watermark" style="display:none; text-align:right; font-size:10px; color:#999; margin-top:10px;">Created by RURU-prog</div>
        </div>
        <div style="text-align:center; font-size:9px; color:#ccc; margin-top:15px;">VERSION 7.5 (FINAL ENGINE)</div>
    </div>
</div>

<div id="preview-overlay">
    <div class="tip-text">✨ 飲水成就圖已產生！<br>請長按圖片或右鍵儲存相簿</div>
    <img id="preview-img" src="">
    <button class="btn-close" onclick="closePreview()">關閉預覽</button>
</div>

<script>
    let appData = { cups: [], config: {} };
    const KEY = 'RURU_V75';

    function startApp(isAuto = false) {
        const gender = document.getElementById('gender').value;
        const age = parseInt(document.getElementById('age').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const status = document.getElementById('status').value;
        const cupSize = parseInt(document.getElementById('cupSize').value) || 250;
        const hGoal = document.getElementById('hourlyGoal').value;

        let target = (status === 'chronic_disease') ? 1200 : (weight * (age >= 65 ? 30 : (gender === 'male' ? 35 : 30))) + (status === 'weight_loss' ? 500 : (status === 'high_temp' ? 800 : 0));
        let limit = (status === 'chronic_disease') ? 1200 : (weight * 50) + (status === 'weight_loss' ? 500 : (status === 'high_temp' ? 800 : 0));

        appData.config = { target, limit, cupSize, date: new Date().toLocaleDateString() };
        document.getElementById('displayDate').innerText = `📅 ${appData.config.date}`;
        document.getElementById('targetAmount').innerText = Math.round(target);
        document.getElementById('limitVal').innerText = Math.round(limit);
        document.getElementById('addBtn').innerText = `＋ 手動新增 ${cupSize}ml`;

        if(!isAuto) {
            appData.cups = [];
            let count = Math.ceil(target / cupSize);
            for(let i=0; i<count; i++) appData.cups.push({ time: null });
        }
        
        renderCups();
        document.getElementById('setup-form').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        updateUI();
    }

    function renderCups() {
        const grid = document.getElementById('cupsGrid');
        grid.innerHTML = '';
        appData.cups.forEach((cup, i) => {
            const div = document.createElement('div');
            div.className = 'cup-item' + (cup.time ? ' done' : '');
            div.onclick = () => toggleCup(i);
            div.innerHTML = `<div class="cup-glass"><div class="cup-water"></div></div><span class="cup-label">${appData.config.cupSize}ml</span><span class="cup-time">${cup.time || '--:--'}</span>`;
            grid.appendChild(div);
        });
    }

    function toggleCup(i) {
        appData.cups[i].time = appData.cups[i].time ? null : new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
        renderCups();
        updateUI();
        save();
    }

    function addNewCup() {
        appData.cups.push({ time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}) });
        renderCups();
        updateUI();
        save();
    }

    function updateUI() {
        let total = appData.cups.reduce((s, c) => s + (c.time ? appData.config.cupSize : 0), 0);
        document.getElementById('totalVal').innerText = total;
        document.getElementById('progressBar').style.width = Math.min((total/appData.config.target)*100, 100) + '%';
        
        const note = document.getElementById('statusNote');
        if(total > appData.config.limit) {
            note.innerText = "⚠️ 警示：飲水已達極限！過量補水可能造成身體負擔。";
            document.getElementById('limitBox').style.color = 'red';
        } else {
            note.innerText = total >= appData.config.target ? "🎉 太棒了！今日目標已達成！" : "💧 規律補水能加速代謝，讓身體保持活力。";
            document.getElementById('limitBox').style.color = 'var(--danger)';
        }
        if(total >= appData.config.target && !window.conf) {
            confetti({particleCount:100, spread:70, origin:{y:0.6}});
            window.conf = true;
        }
    }

    function save() { localStorage.setItem(KEY, JSON.stringify(appData)); }

    function resetApp() { if(confirm("確定重設今日紀錄？")) { localStorage.removeItem(KEY); location.reload(); } }

    function captureImage() {
        const node = document.getElementById('main-card');
        const hide = document.getElementById('hide-on-export');
        const mark = document.getElementById('watermark');
        
        hide.style.display = 'none';
        mark.style.display = 'block';

        domtoimage.toJpeg(node, { quality: 0.95, bgcolor: '#ffffff' })
            .then(function (dataUrl) {
                document.getElementById('preview-img').src = dataUrl;
                document.getElementById('preview-overlay').style.display = 'flex';
                hide.style.display = 'block';
                mark.style.display = 'none';
            })
            .catch(function (error) {
                alert('製圖失敗，請檢查瀏覽器權限或試著重新整理網頁。');
                hide.style.display = 'block';
                mark.style.display = 'none';
            });
    }

    function closePreview() { document.getElementById('preview-overlay').style.display = 'none'; }

    // 自動換日載入
    const saved = localStorage.getItem(KEY);
    if(saved) {
        const parsed = JSON.parse(saved);
        if(parsed.config.date === new Date().toLocaleDateString()) {
            appData = parsed;
            startApp(true);
        }
    }
</script>
</body>
</html>
